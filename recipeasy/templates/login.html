<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <style>
            h2 {
                text-align: center;
                font-size: 80px;
                color: #000000;
                padding-top: 100px;
            }
            div {
                display: flex;
                justify-content: center;
                font-size: 30px;
                margin: -50px;
            }
            container1 {
                display: flex;
                justify-content: center;
                padding-top: 50px;
            } container2 {
                display: flex;
                justify-content: center;
            } button {
                background-color: #4CAF50;
                color: white;
                padding: 10px 20px;
                margin: 5px;
                cursor: pointer;
                font-size: 20px;
            } button:hover {
                background-color: #45a049;
            }
            input[type="text"] {
                padding: 10px;
                margin: 5px;
                font-size: 15px;
            } input[type="password"] {
                padding: 10px;
                margin: 5px;
                font-size: 15px;
            }
        </style>
    </head>
    <body>
        <h2>RecipEasy</h2>
        <div>
            <form method="post">
                Username: <input type="text" name="username"><br><br>
                Password: <input type="password" name="password"><br><br>
                <container1>
                    <button type="submit">Login</button>
                </container1>
                <container2>
                    <button type="button">Sign up</button>
                </container2>
            </form>
        </div>
    </body>
</html>
