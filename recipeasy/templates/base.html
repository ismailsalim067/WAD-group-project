<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Recipeasy{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        {% block extra_css %}{% endblock %}
    </head>
    <body class="bg-light">

        <div class="container mt-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span>Account: {{ user.username }}</span>
                <div>
                    {% if user.is_authenticated %}
                        <a href="{% url 'recipes:logout' %}" class="btn btn-outline-dark">Sign Out</a>
                    {% else %}
                        <a href="{% url 'recipes:login' %}" class="btn btn-outline-dark me-2">Log In</a>
                        <a href="{% url 'recipes:signup' %}" class="btn btn-outline-dark">Sign Up</a>
                    {% endif %}
                </div>
            </div>
        </div>

        <div class="container">
            {% block content %}
            {% endblock %}
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

        {% block extra_js %}{% endblock %}
    </body>
</html>
